worker_processes auto;
events {
    worker_connections 2048;
}
http {
    access_log off;
    error_log /dev/stderr error;

    upstream api {
        server api1:8080;
        server api2:8080;
        keepalive 128;
    }

    server {
        listen 9999;
        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
