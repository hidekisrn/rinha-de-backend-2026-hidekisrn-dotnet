# Stack do desafio: nginx (LB) + 2 instâncias da API.
# Soma dos limites: CPU 0.20+0.40+0.40 = 1.0 ; memória 50+150+150 = 350 MB.
# Imagem pública no Docker Hub: hidekisrn/rinha-fraud-dotnet:v1
# Para o código-fonte e detalhes: branch `main`.
services:
  api1:
    image: hidekisrn/rinha-fraud-dotnet:v1
    environment:
      - NPROBE=4
      - DOTNET_gcServer=1
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: hidekisrn/rinha-fraud-dotnet:v1
    environment:
      - NPROBE=4
      - DOTNET_gcServer=1
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on: [api1, api2]
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

networks:
  app:
    driver: bridge
