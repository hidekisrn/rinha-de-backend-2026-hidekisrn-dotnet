services:
  api1:
    image: rinha-fraud:latest
    environment:
      - NPROBE=16
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: rinha-fraud:latest
    environment:
      - NPROBE=16
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on: [api1, api2]
    networks: [app]
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

networks:
  app:
    driver: bridge
